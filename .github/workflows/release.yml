name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release from tag
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" 2>/dev/null || gh release create "$TAG" --title "${TAG#v}" --generate-notes

      - name: Ensure v1.0.0 release exists
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v1.0.0 2>/dev/null || gh release create v1.0.0 --title "1.0.0" --notes "Initial release: site-scoped file manager for VitoDeploy with browse, edit, upload, download, rename, copy, delete, compress, and extract."

      - name: Add vitodeploy-plugin topic
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TOPICS=$(gh api repos/${{ github.repository }} --jq '.topics | join(",")')
          if [[ ",$TOPICS," != *",vitodeploy-plugin,"* ]]; then
            gh api -X PUT repos/${{ github.repository }}/topics -f names='["vitodeploy-plugin"]' -H "Accept: application/vnd.github+json"
          fi
